        '  "dimensionAnalysis": [',
        '    {"key":"brand","name":"string","score":0,"level":"string","gap":0,"diagnosis":"string","swotFocus":"string","actions":["string"],"kpis":["string"],"risks":["string"]}',

        '5. 当前调用提供方：'+providerLabel+'。',

function extractJsonObjectClient(text){
    if(text==null)throw new Error('模型未返回内容');
    if(typeof text!=='string')text=JSON.stringify(text);
    text=text.trim();
    if(!text)throw new Error('模型返回内容为空');
    try{return JSON.parse(text)}catch(e){}
    var start=text.indexOf('{');
    var end=text.lastIndexOf('}');
    if(start>=0&&end>start){
        try{return JSON.parse(text.slice(start,end+1))}catch(e2){}
    }
    throw new Error('模型返回的不是有效 JSON')
}
async function callProviderDirect(provider,cfg,company){
    var baseUrl=String(cfg.base_url||'').trim().replace(/\/+$/,'');
    var endpoint=((cfg.endpoint||'/chat/completions').trim()||'/chat/completions');
    endpoint=endpoint.charAt(0)==='/'?endpoint:'/'+endpoint;
    var url=baseUrl+endpoint;
    var payload=window.getLocalAnalysisInput(company);
    var prompt=buildClientAnalysisPrompt(payload,provider);
    var reqBody={
        model:String(cfg.model||'').trim(),
        temperature:0.3,
        messages:[
            {role:'system',content:'你是严谨的产业集群诊断 AI，只输出 JSON。'},
            {role:'user',content:prompt}
        ]
    };
    if(provider!=='deepseek'){
        reqBody.response_format={type:'json_object'};
    }
    var res=await fetch(url,{
        method:'POST',
        headers:{
            'Content-Type':'application/json',
            'Authorization':'Bearer '+String(cfg.api_key||'').trim()
        },
        body:JSON.stringify(reqBody)
    });
    var rawText=await res.text();
    var parsed={};
    try{parsed=rawText?JSON.parse(rawText):{}}catch(e){parsed={raw:rawText}}
    if(!res.ok){
        var msg=(parsed&&((parsed.error&&parsed.error.message)||parsed.message||parsed.error)) || rawText || ('HTTP '+res.status);
        throw new Error(String(msg))
    }
    var content='';
    if(parsed&&parsed.choices&&parsed.choices[0]&&parsed.choices[0].message){
        content=parsed.choices[0].message.content;
    }else{
        content=rawText;
    }
    if(Array.isArray(content)){
        content=content.map(function(part){
            if(typeof part==='string')return part;
            return part&&part.text?part.text:JSON.stringify(part);
        }).join('\\n');
    }
    var report=extractJsonObjectClient(content);
    if(!report.model)report.model=String(cfg.model||'').trim();
    return report
}

window.syncAiCompanyOptions=function(){
    var companies=typeof window.getAllCompaniesForUser==='function'?window.getAllCompaniesForUser():[];
    var selects=Array.prototype.slice.call(document.querySelectorAll('.ai-company-select'));
    if(!selects.length)return;
    var primary=document.getElementById('selectCompany')||selects[0];
    var current=(primary&&primary.value)||'';
    var optionsHtml=buildCompaniesOptionsHtml(companies);
    selects.forEach(function(sel){
        var selected=sel.value||current;
        sel.innerHTML=optionsHtml;
        if(selected&&companies.some(function(c){return c.name===selected;})){
            sel.value=selected;
        }
        sel.onchange=function(){

window.normalizeAiReport=window.normalizeAiReport||function(provider,report,company){
    var scores={};
    getResearchOrder().forEach(function(k){
        scores[k]=Math.max(0,Math.min(100,parseInt((report.scores&&report.scores[k])!=null?report.scores[k]:0,10)||0))
    });
    var totalScore=Math.max(0,Math.min(100,parseInt(report.overallScore,10)||Math.round(Object.values(scores).reduce(function(acc,v){return acc+v},0)/8)));
    var level=(typeof window.getLevel==='function'?window.getLevel(totalScore):{text:report.overallLevel||'C级',cls:'level-c'});
    var solutions=(report.solutions||[]).map(function(s){
        return {
            title:s.title||'未命名方案',
            priority:s.priority==='high'||s.priority==='low'?s.priority:'medium',
            content:Array.isArray(s.content)?s.content:[],
            steps:Array.isArray(s.steps)?s.steps:[]
        }
    });
    return {
        provider:provider,
        providerLabel:window.getProviderMeta(provider).label,
        model:report.model||window.getProviderConfig(provider).model||'',
        scores:scores,
        totalScore:totalScore,
        level:level,
        company:company,
        solutions:solutions,
        research:(typeof window.buildResearchMeta==='function'?window.buildResearchMeta(scores):{method:'五维融合八要素模型',source:'平台内置研究口径'}),
        apiReport:report
    }
};

window.checkAIServer=async function(){
    try{
        var res=await fetch('http://127.0.0.1:8765/api/status',{method:'GET'});
        var data=await res.json();
        if(!res.ok||!data.ok)throw new Error(data.error||'代理不可用');
        window.aiServerStatusCache=data;
        ['mimo','deepseek','chatgpt'].forEach(function(provider){
            var statusEl=document.getElementById('apiStatus-'+provider);
            if(statusEl)statusEl.textContent='本地代理在线，同时支持浏览器直连。服务器时间：'+(data.serverTime||'');
            if(window.setApiInlineAlert)window.setApiInlineAlert(provider,'本地代理连接正常，也可继续直接从页面调用 API。',true);
        });
        if(window.showToast)window.showToast('AI 代理服务连接正常');
    }catch(err){
        ['mimo','deepseek','chatgpt'].forEach(function(provider){
            var statusEl=document.getElementById('apiStatus-'+provider);
            if(statusEl)statusEl.textContent='浏览器直连模式可用：无需本地代理，填写 Base URL、Model、API Key 即可。';
            if(window.setApiInlineAlert)window.setApiInlineAlert(provider,'当前未连接本地代理，但这不影响 GitHub Pages 页面直接调用模型 API。',true);
        });
        if(window.showToast)window.showToast('已切换为浏览器直连模式');
    }
};
window.startAIAnalysis=async function(provider){
    provider=provider||(window.getActiveAIProvider?window.getActiveAIProvider():'mimo');
    var panel=document.getElementById('aiPanel-'+provider);
    var select=panel?panel.querySelector('.ai-company-select'):document.getElementById('selectCompany');
    var fallback=document.getElementById('selectCompany');
    var name=(select&&select.value)||(fallback&&fallback.value)||'';
    if(!name){if(window.showToast)window.showToast('请先选择企业');return}
    if(window.setAiCompanySelection)window.setAiCompanySelection(name);
    window.companyData=window.findCompanyBySelection?window.findCompanyBySelection(name):null;
    if(!window.companyData){if(window.showToast)window.showToast('未找到企业数据');return}
    var cfg={
        base_url:(document.getElementById('apiBaseUrl-'+provider)||{}).value||'',
        model:(document.getElementById('apiModel-'+provider)||{}).value||'',
        api_key:(document.getElementById('apiKey-'+provider)||{}).value||'',
        endpoint:(document.getElementById('apiEndpoint-'+provider)||{}).value||'/chat/completions'
    };
    if(window.saveProviderConfig)window.saveProviderConfig(provider,cfg);
    if(!cfg.base_url||!cfg.model||!cfg.api_key){
        if(window.showToast)window.showToast('请先填写 '+window.getProviderMeta(provider).label+' 的 Base URL、Model 和 API Key');
        var missingStatus=document.getElementById('apiStatus-'+provider);
        if(missingStatus)missingStatus.textContent='缺少配置：请填写 Base URL、Model、API Key 后再开始分析。';
        if(window.setApiInlineAlert)window.setApiInlineAlert(provider,'按钮已经触发，但当前缺少必要配置：Base URL、Model、API Key 必须全部填写。');
        return
    }
    if(window.setApiInlineAlert)window.setApiInlineAlert(provider,shouldPreferDirectApi()?'按钮已触发，正在从浏览器直接调用 '+window.getProviderMeta(provider).label+' ...':'按钮已触发，正在优先尝试本地代理；失败后会自动切换到浏览器直连。',true);
    if(window.showLoading)window.showLoading('正在调用 '+window.getProviderMeta(provider).label+' API 生成完整诊断方案...');
    try{
        var report;
        if(shouldPreferDirectApi()){
            report=await callProviderDirect(provider,cfg,window.companyData);
        }else{
            try{
                var proxyRes=await fetch('http://127.0.0.1:8765/api/ai/analyze',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        provider:window.getProviderKey(provider),
                        providerConfig:cfg,
                        analysis_input:window.getLocalAnalysisInput(window.companyData)
                    })
                });
                var proxyData=await proxyRes.json();
                if(!proxyRes.ok||!proxyData.ok)throw new Error(proxyData.error||'API 请求失败');
                report=proxyData.report;
            }catch(proxyErr){
                if(window.setApiInlineAlert)window.setApiInlineAlert(provider,'本地代理不可用，正在自动切换到浏览器直连模式...',true);
                report=await callProviderDirect(provider,cfg,window.companyData);
            }
        }
        window.diagnosisResult=window.normalizeAiReport(provider,report,window.companyData);
        if(window.saveUserAnalysis)window.saveUserAnalysis({c:name,s:window.diagnosisResult.totalScore,l:window.diagnosisResult.level.text,t:new Date().toLocaleString('zh-CN')});
        window.showAIReport=function(){
            if(!window.diagnosisResult)return;
            document.getElementById('aiReportContent').innerHTML=window.buildApiReportHtml(window.diagnosisResult);
            document.getElementById('aiAnalysisResult').style.display='block';
            if(window.updateEvaluationPage)window.updateEvaluationPage();
            setTimeout(function(){if(window.openAiDimensionDetail)window.openAiDimensionDetail(window.RESEARCH_FUSION_MODEL.order[0])},60);
            setTimeout(function(){
                if(window.openAiPhaseDetail && (window.diagnosisResult.apiReport||{}).phases && window.diagnosisResult.apiReport.phases.length){
                    window.openAiPhaseDetail(0);
                }
            },90);
        };
        window.showAIReport();
        if(window.setApiInlineAlert)window.setApiInlineAlert(provider,window.getProviderMeta(provider).label+' 已成功返回分析结果，报告已生成。',true);
        if(window.showToast)window.showToast(window.getProviderMeta(provider).label+' API 分析完成');
    }catch(err){
        if(window.showToast)window.showToast('分析失败：'+err.message);
        var statusEl=document.getElementById('apiStatus-'+provider);
        if(statusEl)statusEl.textContent='分析失败：'+err.message;
        if(window.setApiInlineAlert)window.setApiInlineAlert(provider,'分析失败：'+err.message+'。请检查 Base URL、Endpoint、Model、API Key 是否正确；若服务商限制浏览器跨域，请改用其支持浏览器调用的端点或兼容地址。');
    }finally{
        if(window.hideLoading)window.hideLoading();
    }
};
document.addEventListener('change',function(evt){
    var target=evt.target;
    if(target&&target.classList&&target.classList.contains('ai-company-select')){
        if(window.setAiCompanySelection)window.setAiCompanySelection(target.value||'');
    }
});
document.addEventListener('DOMContentLoaded',function(){
    setTimeout(function(){
        if(typeof window.updateCompanySelect==='function')window.updateCompanySelect();
        if(typeof window.ensureAiPanelsUpgraded==='function')window.ensureAiPanelsUpgraded();
        if(typeof window.syncAiCompanyOptions==='function')window.syncAiCompanyOptions();
        setBrowserModeHint();
    },80);
});
if(document.readyState!=='loading'){
    setTimeout(function(){
        if(typeof window.updateCompanySelect==='function')window.updateCompanySelect();
        if(typeof window.ensureAiPanelsUpgraded==='function')window.ensureAiPanelsUpgraded();
        if(typeof window.syncAiCompanyOptions==='function')window.syncAiCompanyOptions();
        setBrowserModeHint();
    },0);
}
